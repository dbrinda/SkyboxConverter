<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Skybox Converter</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f0f0f; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: #1a1a1a; padding: 2rem; border-radius: 12px; max-width: 900px; width: 100%; border: 1px solid #333; text-align: center; }
        .drop-zone { border: 2px dashed #444; padding: 40px; border-radius: 8px; margin: 20px 0; cursor: pointer; transition: 0.2s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: #222; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .face-box { background: #252525; padding: 15px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; }
        canvas { width: 100%; border-radius: 4px; display: block; margin-bottom: 10px; background: #000; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
        strong { font-size: 0.85rem; word-break: break-all; color: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h1>Roblox Skybox Processor</h1>
    <div class="drop-zone" id="dropZone">
        Click or Drag Panorama Here
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>
    <div id="grid"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const grid = document.getElementById('grid');
    let baseFileName = "Skybox";

    // Orientation vectors with specific 90deg rotations for Top/Bottom
    const faces = [
        { name: 'front',  suffix: 'Ft', dir: [0, 0, 1],  up: [0, -1, 0],  right: [-1, 0, 0] },
        { name: 'back',   suffix: 'Bk', dir: [0, 0, -1], up: [0, -1, 0],  right: [1, 0, 0]  },
        // Top: Rotated 90deg CCW
        { name: 'up',     suffix: 'Up', dir: [0, 1, 0],  up: [1, 0, 0],   right: [0, 0, 1]  },
        // Bottom: Rotated 90deg CW
        { name: 'down',   suffix: 'Dn', dir: [0, -1, 0], up: [-1, 0, 0],  right: [0, 0, 1]  },
        { name: 'right',  suffix: 'Rt', dir: [1, 0, 0],  up: [0, -1, 0],  right: [0, 0, 1]  },
        { name: 'left',   suffix: 'Lf', dir: [-1, 0, 0], up: [0, -1, 0],  right: [0, 0, -1] }
    ];

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => {
            e.preventDefault(); e.stopPropagation();
        }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', e => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            fileInput.files = files;
            handleFile({ target: { files } });
        }
    }, false);

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = handleFile;

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        baseFileName = file.name.replace(/\.[^/.]+$/, "");
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => process(img);
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function process(img) {
        grid.innerHTML = '';
        const size = Math.min(img.width / 4, 2048);
        const srcCanvas = document.createElement('canvas');
        srcCanvas.width = img.width; srcCanvas.height = img.height;
        const srcCtx = srcCanvas.getContext('2d');
        srcCtx.drawImage(img, 0, 0);
        const srcData = srcCtx.getImageData(0, 0, img.width, img.height).data;

        faces.forEach(face => {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            const dstData = ctx.createImageData(size, size);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const nx = (2 * x / size) - 1;
                    const ny = (2 * y / size) - 1;
                    const vx = face.dir[0] + nx * face.right[0] + ny * face.up[0];
                    const vy = face.dir[1] + nx * face.right[1] + ny * face.up[1];
                    const vz = face.dir[2] + nx * face.right[2] + ny * face.up[2];
                    const r = Math.sqrt(vx*vx + vy*vy + vz*vz);
                    const phi = Math.atan2(vz, vx);
                    const theta = Math.acos(vy / r);
                    const u = (phi + Math.PI) / (2 * Math.PI) * img.width;
                    const v = (theta / Math.PI) * img.height;
                    const outIndex = (y * size + x) * 4;
                    sampleBilinear(srcData, u, v, img.width, img.height, dstData.data, outIndex);
                }
            }
            ctx.putImageData(dstData, 0, 0);
            
            const robloxName = `${baseFileName}_${face.suffix}`;
            const div = document.createElement('div');
            div.className = 'face-box';
            const displayCanvas = document.createElement('canvas');
            displayCanvas.width = size; displayCanvas.height = size;
            displayCanvas.getContext('2d').drawImage(canvas, 0, 0);
            div.appendChild(displayCanvas);
            div.innerHTML += `<strong>${robloxName}</strong>`;

            const dl = document.createElement('a');
            dl.className = 'btn';
            dl.innerText = 'Download JPG';
            dl.download = `${robloxName}.jpg`;
            dl.href = canvas.toDataURL('image/jpeg', 0.9);
            
            div.appendChild(dl);
            grid.appendChild(div);
        });
    }

    function sampleBilinear(data, u, v, w, h, out, outIndex) {
        const u1 = Math.floor(u); const v1 = Math.floor(v);
        const u2 = (u1 + 1) % w;  const v2 = Math.min(v1 + 1, h - 1);
        const fU = u - u1;        const fV = v - v1;
        for (let i = 0; i < 4; i++) {
            const p1 = data[(v1 * w + u1) * 4 + i];
            const p2 = data[(v1 * w + u2) * 4 + i];
            const p3 = data[(v2 * w + u1) * 4 + i];
            const p4 = data[(v2 * w + u2) * 4 + i];
            out[outIndex + i] = p1 * (1-fU) * (1-fV) + p2 * fU * (1-fV) + p3 * (1-fU) * fV + p4 * fU * fV;
        }
    }
</script>
</body>
</html>
