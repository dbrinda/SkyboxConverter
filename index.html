<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skybox Converter</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        #grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .face-box { background: #333; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; }
        canvas { max-width: 256px; height: auto; margin-bottom: 10px; background: #000; }
        .btn { display: inline-block; padding: 8px 16px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        input[type="file"] { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Skybox to Cube Faces</h1>
    <input type="file" id="upload" accept="image/*">
    <div id="grid"></div>

    <script>
        const upload = document.getElementById('upload');
        const grid = document.getElementById('grid');
        let baseFileName = "skybox";

        const faces = [
            { suffix: 'bk', dir: [-1, 0, 0], right: [0, 0, 1], up: [0, 1, 0] },
            { suffix: 'dn', dir: [0, -1, 0], right: [1, 0, 0], up: [0, 0, 1] },
            { suffix: 'ft', dir: [1, 0, 0], right: [0, 0, -1], up: [0, 1, 0] },
            { suffix: 'lf', dir: [0, 0, -1], right: [-1, 0, 0], up: [0, 1, 0] },
            { suffix: 'rt', dir: [0, 0, 1], right: [1, 0, 0], up: [0, 1, 0] },
            { suffix: 'up', dir: [0, 1, 0], right: [1, 0, 0], up: [0, 0, -1] }
        ];

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            baseFileName = file.name.replace(/\.[^/.]+$/, "");
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => process(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function sampleBilinear(data, u, v, width, height, outData, outIndex) {
            const x = Math.max(0, Math.min(width - 1, u));
            const y = Math.max(0, Math.min(height - 1, v));
            const x1 = Math.floor(x), x2 = Math.min(x1 + 1, width - 1);
            const y1 = Math.floor(y), y2 = Math.min(y1 + 1, height - 1);
            const dx = x - x1, dy = y - y1;

            for (let i = 0; i < 4; i++) {
                const p1 = data[(y1 * width + x1) * 4 + i];
                const p2 = data[(y1 * width + x2) * 4 + i];
                const p3 = data[(y2 * width + x1) * 4 + i];
                const p4 = data[(y2 * width + x2) * 4 + i];
                outData[outIndex + i] = (1 - dx) * (1 - dy) * p1 + dx * (1 - dy) * p2 + (1 - dx) * dy * p3 + dx * dy * p4;
            }
        }

        function createFaceBox(canvas, name) {
            const div = document.createElement('div');
            div.className = 'face-box';

            const displayCanvas = document.createElement('canvas');
            displayCanvas.width = canvas.width;
            displayCanvas.height = canvas.height;
            displayCanvas.getContext('2d').drawImage(canvas, 0, 0);

            div.appendChild(displayCanvas);
            div.innerHTML += `<p><strong>${name}</strong></p>`;

            const dl = document.createElement('a');
            dl.className = 'btn';
            dl.innerText = 'Download JPG';
            dl.download = `${name}.jpg`;
            dl.href = canvas.toDataURL('image/jpeg', 0.9);

            div.appendChild(dl);
            grid.appendChild(div);
        }

        function process(img) {
            grid.innerHTML = '';

            // 1. Generate Thumbnail (400x200 Equirectangular)
            const tnCanvas = document.createElement('canvas');
            tnCanvas.width = 400;
            tnCanvas.height = 200;
            const tnCtx = tnCanvas.getContext('2d');
            tnCtx.drawImage(img, 0, 0, 400, 200);
            createFaceBox(tnCanvas, `${baseFileName}_tn`);

            // 2. Setup Cube Face Parameters
            const size = Math.min(img.width / 4, 2048);
            const srcCanvas = document.createElement('canvas');
            srcCanvas.width = img.width;
            srcCanvas.height = img.height;
            const srcCtx = srcCanvas.getContext('2d');
            srcCtx.drawImage(img, 0, 0);
            const srcData = srcCtx.getImageData(0, 0, img.width, img.height).data;

            // 3. Process each Face
            faces.forEach(face => {
                const canvas = document.createElement('canvas');
                canvas.width = canvas.height = size;
                const ctx = canvas.getContext('2d');
                const dstData = ctx.createImageData(size, size);

                for (let y = 0; y < size; y++) {
                    for (let x = 0; x < size; x++) {
                        const nx = (2 * x / size) - 1;
                        const ny = (2 * y / size) - 1;
                        const vx = face.dir[0] + nx * face.right[0] + ny * face.up[0];
                        const vy = face.dir[1] + nx * face.right[1] + ny * face.up[1];
                        const vz = face.dir[2] + nx * face.right[2] + ny * face.up[2];

                        const r = Math.sqrt(vx * vx + vy * vy + vz * vz);
                        const phi = Math.atan2(vz, vx);
                        const theta = Math.acos(vy / r);

                        const u = (phi + Math.PI) / (2 * Math.PI) * img.width;
                        const v = (theta / Math.PI) * img.height;

                        const outIndex = (y * size + x) * 4;
                        sampleBilinear(srcData, u, v, img.width, img.height, dstData.data, outIndex);
                    }
                }
                ctx.putImageData(dstData, 0, 0);
                createFaceBox(canvas, `${baseFileName}_${face.suffix}`);
            });
        }
    </script>
</body>
</html>
